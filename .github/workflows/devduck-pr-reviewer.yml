name: DevDuck AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  devduck-review:
    runs-on: ubuntu-latest
    
    # We need these permissions to post a comment on the PR
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install parcle requests python-dotenv

      - name: Run DevDuck AI Code Analysis
        env:
          PARCLE_API_KEY: ${{ secrets.PARCLE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_ID: "taskapp" # Change this to the DevDuck project you want to test against
        run: |
          python pr-reviewer-bot/github_action.py
